<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Enterprise Scheduling Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="brand">SchedDash</h1>
      <nav>
        <button data-section="home" class="active">Home</button>
        <button data-section="this-week">This Week</button>
        <button data-section="next-week">Next Week</button>
        <button data-section="employees">Employees</button>
      </nav>
    </aside>

    <main class="main">
      <section id="home" class="section active">
        <div class="home-top">
          <h2>Today's Overview</h2>
          <div class="kpis">
            <div class="kpi">Areas filled: <span id="kpi-filled">0</span></div>
            <div class="kpi">Areas unfilled: <span id="kpi-unfilled">0</span></div>
            <div class="kpi">Employees scheduled: <span id="kpi-emps">0</span></div>
          </div>
        </div>
        <div id="today-overview" class="glass-panel">No schedule yet. Generate schedules to populate overview.</div>
      </section>

      <section id="this-week" class="section">
        <h2>This Week</h2>
        <div class="controls"><label>Week start: <input id="this-week-start" type="date"></label></div>
        <div id="this-week-panel" class="glass-panel schedule-container"></div>
        <div class="controls"><button id="gen-this-week">Generate Schedule</button>
        <button data-export="this-week" class="export">Export CSV</button></div>
      </section>

      <section id="next-week" class="section">
        <h2>Next Week</h2>
        <div class="controls"><label>Week start: <input id="next-week-start" type="date"></label></div>
        <div id="next-week-panel" class="glass-panel schedule-container"></div>
        <div class="controls"><button id="gen-next-week">Generate Schedule</button>
        <button data-export="next-week" class="export">Export CSV</button></div>
      </section>

      <section id="employees" class="section">
        <h2>Employees</h2>
        <div class="glass-panel">
          <button id="add-employee">Add Employee</button>
          <table id="employees-table" class="simple-table"><thead><tr><th>Name</th><th>Qualifications</th><th>Fixed</th><th>Days Off</th><th>Actions</th></tr></thead><tbody></tbody></table>
        </div>
      </section>
    </main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-inner">
      <h3 id="modal-title">Employee</h3>
      <form id="modal-form">
        <label>Name: <input name="name"></label>
        <label>Qualifications (comma separated): <input name="quals"></label>
        <label>Fixed area (optional): <input name="fixed"></label>
        <label>Days off (comma weekday numbers 0-6): <input name="daysOff"></label>
        <label>Vacation (YYYY-MM-DD, comma): <input name="vacation"></label>
        <div class="modal-actions"><button type="submit">Save</button><button type="button" id="cancel-modal">Cancel</button></div>
      </form>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/scheduleEngine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
